apiVersion: v1
kind: Namespace
metadata:
  name: ns2                                                     # 创建ns2命名空间
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-nginx-n2
  namespace: ns2                                                # 属于ns2命名空间
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-n2
  template:
    metadata:
      labels:
        app: nginx-n2
    spec:
      containers:
        - name: nginx
          image: shixiaochuangk8s/nginx:1.15-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: svc2                                # 服务名
  namespace: ns2                            # 属于ns2命名空间
spec:
  selector:
    app: nginx-n2
  clusterIP: None                           # 无头service
  ports:
    - port: 80
      targetPort: 80
---
kind: Service
apiVersion: v1
metadata:
  name: external-svc1
  namespace: ns2                            #  属于ns2命名空间
spec:
  type: ExternalName
  externalName: svc1.ns1.svc.cluster.local   # 将ns1空间的svc1服务引入到ns2命名空间