apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-server-cmd
  namespace: service-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-cmd
  template:
    metadata:
      labels:
        app: nginx-cmd
    spec:
      containers:
        - name: c1
          image: shixiaochuangk8s/nginx:1.15-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80