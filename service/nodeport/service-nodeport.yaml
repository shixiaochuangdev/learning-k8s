apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-app-nodeport
  namespace: service-ns
  labels:
    app: nginx-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-app-nodeport
  template:
    metadata:
      labels:
        app: nginx-app-nodeport
    spec:
      containers:
        - name: c1
          image: shixiaochuangk8s/nginx:1.15-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: service-nodeport
  namespace: service-ns
spec:
  type: NodePort
  selector:
    app: nginx-app-nodeport
  ports:
    - protocol: TCP
      nodePort: 30001
      port: 8060
      targetPort: 80