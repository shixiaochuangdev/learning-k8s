apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-metallb
  namespace: service-ns
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-metallb
  template:
    metadata:
      labels:
        app: nginx-metallb
    spec:
      containers:
        - name: nginx-metallb1
          image: shixiaochuangk8s/nginx:1.15-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-metallb
  namespace: service-ns
spec:
  ports:
    - port: 8090
      protocol: TCP
      targetPort: 80
  selector:
    app: nginx-metallb
  type: LoadBalancer