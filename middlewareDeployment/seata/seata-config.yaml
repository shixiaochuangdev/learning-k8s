apiVersion: v1
kind: ConfigMap
metadata:
  name: seata-server-config
  namespace: seata-ns
data:
  application.yml: |
    server:
      port: 7091

    spring:
      application:
        name: seata-server

    logging:
      config: classpath:logback-spring.xml
      file:
        path: ${user.home}/logs/seata

    console:
      user:
        username: seata
        password: seata

    seata:
      config:
        type: nacos
        nacos:
          server-addr: nacos.nacos-ns.svc.cluster.local:8848
          namespace: 63f0dbe6-ac91-4a2e-a88e-82b76f8187b6
          group: SEATA_GROUP
          data-id: seataServer.properties
          file-extension: properties
          username: nacos
          password: nacos

      registry:
        type: nacos
        nacos:
          application: seata-server
          server-addr: nacos.nacos-ns.svc.cluster.local:8848
          namespace: 63f0dbe6-ac91-4a2e-a88e-82b76f8187b6
          group: SEATA_GROUP
          username: nacos
          password: nacos
          cluster: GZ

      security:
        secretKey: SeataSecretKey0c382ef121d778043159209298fd40bf3850a017
        tokenValidityInMilliseconds: 1800000
        ignore:
          urls: /,/**/*.css,/**/*.js,/**/*.html,/**/*.map,/**/*.svg,/**/*.png,/**/*.ico,/console-fe/public/**,/api/v1/auth/login