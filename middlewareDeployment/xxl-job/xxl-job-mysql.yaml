apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: xxl-job-ns
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "root"
  MYSQL_PASSWORD: "xxl-job"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: xxl-job-ns
data:
  MYSQL_USER: "xxl-job"
  MYSQL_DATABASE: "xxl-job"
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: xxl-job-ns
spec:
  ports:
  - port: 3306
    name: mysql
  clusterIP: None
  selector:
    app: mysql-public
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: xxl-job-db
  namespace: xxl-job-ns
spec:
  selector:
    matchLabels:
      app: mysql-public
  serviceName: "mysql"
  template:
    metadata:
      labels:
        app: mysql-public
    spec:
      containers:
      - name: mysql
        image: shixiaochuangk8s/mysql:8.0.33
        ports:
        - containerPort: 3306

        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_ROOT_PASSWORD

        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_PASSWORD

        - name: MYSQL_USER
          valueFrom:
            configMapKeyRef:
              name: mysql-config
              key: MYSQL_USER

        - name: MYSQL_DATABASE
          valueFrom:
            configMapKeyRef:
              name: mysql-config
              key: MYSQL_DATABASE

        volumeMounts:
        - mountPath: "/var/lib/mysql"
          name: mysql-data

  volumeClaimTemplates:
  - metadata:
      name: mysql-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: "csi-rbd-sc"
      resources:
        requests:
          storage: 5Gi