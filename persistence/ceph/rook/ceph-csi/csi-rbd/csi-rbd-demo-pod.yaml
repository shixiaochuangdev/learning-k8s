apiVersion: v1
kind: Pod
metadata:
  name: csi-rbd-demo-pod
  namespace: rbd-ns
spec:
  containers:
    - name: web-server
      image: shixiaochuangk8s/nginx:1.18
      volumeMounts:
        - name: mypvc
          mountPath: /var/lib/www/html
  volumes:
    - name: mypvc
      persistentVolumeClaim:
        claimName: rbd-pvc
        readOnly: false