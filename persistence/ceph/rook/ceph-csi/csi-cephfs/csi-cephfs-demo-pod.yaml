---
apiVersion: v1
kind: Pod
metadata:
  name: csi-cephfs-demo-pod
  namespace: cephfs-ns
spec:
  containers:
    - name: web-server
      image: shixiaochuangk8s/nginx:1.15-alpine
      volumeMounts:
        - name: mypvc
          mountPath: /var/lib/www
  volumes:
    - name: mypvc
      persistentVolumeClaim:
        claimName: csi-cephfs-pvc
        readOnly: false