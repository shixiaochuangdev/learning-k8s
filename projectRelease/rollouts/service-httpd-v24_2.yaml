apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: httpd
  name: httpd
  namespace: rollouts
  annotations:
    kubernetes.io/change-cause: "Upgrade to httpd version 2.4"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: httpd
  template:
    metadata:
      labels:
        app: httpd
    spec:
      containers:
        - image: shixiaochuangk8s/httpd:2.4
          name: httpd
          ports:
            - containerPort: 80