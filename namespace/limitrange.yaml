apiVersion: v1
kind: LimitRange
metadata:
  name: limitrange-dev
  namespace: datarc-dev

spec:
  limits:

  - type: Container

    min:
      cpu: 100m
      memory: 128Mi

    max:
      cpu: "1"
      memory: 1Gi

    default:
      cpu: 200m
      memory: 256Mi

    defaultRequest:
      cpu: 100m
      memory: 128Mi