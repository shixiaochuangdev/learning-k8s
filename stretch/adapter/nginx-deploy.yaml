apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-with-exporter
  namespace: metrics-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: shixiaochuangk8s/nginx:1.28.0
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config-volume
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
      - name: nginx-prometheus-exporter
        image: shixiaochuangk8s/nginx-prometheus-exporter:1.5.1
        args: ["-nginx.scrape-uri=http://localhost/status"]
        ports:
        - name: exporter-port
          containerPort: 9113
        resources:
          requests:
            cpu: 50m
            memory: 100Mi
      volumes:
      - name: nginx-config-volume
        configMap:
          name: nginx-config