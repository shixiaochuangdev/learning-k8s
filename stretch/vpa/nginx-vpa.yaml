apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: nginx-vpa
  name: nginx-vpa
  namespace: vpa
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-vpa
  template:
    metadata:
      labels:
        app: nginx-vpa
    spec:
      containers:
      - name: nginx
        image: shixiaochuangk8s/nginx:1.17.3
        resources:
          requests:
            cpu: 100m
            memory: 250Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-vpa
  namespace: vpa
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: nginx-vpa