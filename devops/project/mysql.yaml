apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: project-ns
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "root"
  MYSQL_PASSWORD: "dkd"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: project-ns
data:
  MYSQL_USER: "dkd"
  MYSQL_DATABASE: "dkd"
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: project-ns
spec:
  ports:
  - port: 3306
    name: mysql
  clusterIP: None
  selector:
    app: mysql-public
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
  namespace: project-ns
spec:
  selector:
    matchLabels:
      app: mysql-public
  serviceName: "mysql"
  template:
    metadata:
      labels:
        app: mysql-public
    spec:
      serviceAccountName: harbor-sa
      containers:
      - name: mysql
        image: harbor.shixiaochuang.org/project/mysql:8.0.33
        ports:
        - containerPort: 3306

        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_ROOT_PASSWORD

        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_PASSWORD

        - name: MYSQL_USER
          valueFrom:
            configMapKeyRef:
              name: mysql-config
              key: MYSQL_USER

        - name: MYSQL_DATABASE
          valueFrom:
            configMapKeyRef:
              name: mysql-config
              key: MYSQL_DATABASE

        volumeMounts:
        - mountPath: "/var/lib/mysql"
          name: mysql-data

  volumeClaimTemplates:
  - metadata:
      name: mysql-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: "nfs-csi"
      resources:
        requests:
          storage: 5Gi