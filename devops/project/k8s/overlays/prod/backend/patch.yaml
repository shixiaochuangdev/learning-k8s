# 生产环境 Deployment 覆盖
apiVersion: apps/v1
kind: Deployment
metadata:
  name: exam-system-backend
  namespace: exam-system
spec:
  replicas: 5   # 生产扩容

  template:
    spec:
      containers:
      - name: exam-system
        imagePullPolicy: Always  # 生产必须 Always

---
# 生产域名（如果需要区分）
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: exam-system
  namespace: exam-system
spec:
  hostnames:
    - api.shixiaochuang.org