apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: project-ns
type: Opaque
stringData:
  password: "123321"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: project-ns
spec:
  ports:
    - port: 6379
      name: redis
  clusterIP: None
  selector:
    app: redis-public

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: project-ns
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis-public

  template:
    metadata:
      labels:
        app: redis-public
    spec:
      serviceAccountName: harbor-sa

      containers:
        - name: redis
          image: harbor.shixiaochuang.org/project/redis:7.4.2
          command: ["sh", "-c"]
          args:
            - redis-server --appendonly yes --requirepass $REDIS_PASSWORD

          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password

          ports:
            - containerPort: 6379
              name: redis

          volumeMounts:
            - name: redis-data
              mountPath: /data

          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi

          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a $REDIS_PASSWORD ping
            initialDelaySeconds: 10
            periodSeconds: 5

  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes:
          - ReadWriteMany
        storageClassName: nfs-csi
        resources:
          requests:
            storage: 2Gi