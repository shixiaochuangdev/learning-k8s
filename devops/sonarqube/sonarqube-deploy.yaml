apiVersion: v1
kind: Service
metadata:
  name: sonarqube
  namespace: sonarqube-ns
spec:
  clusterIP: None
  selector:
    app: sonarqube
  ports:
    - port: 9000
      targetPort: 9000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sonarqube-db-config
  namespace: sonarqube-ns
data:
  SONAR_JDBC_USERNAME: "SonarQube"
  SONAR_JDBC_PASSWORD: "SonarQube"
  SONAR_JDBC_URL: "jdbc:postgresql://postgresql:5432/SonarQube"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sonarqube
  namespace: sonarqube-ns
spec:
  serviceName: sonarqube
  replicas: 1
  selector:
    matchLabels:
      app: sonarqube
  template:
    metadata:
      labels:
        app: sonarqube
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: init-sysctl
          image: shixiaochuangk8s/busybox:1.30
          command: [ "sysctl", "-w", "vm.max_map_count=262144" ]
          securityContext:
            privileged: true

      containers:
        - name: sonarqube
          image: shixiaochuangk8s/sonarqube:10.7.0-community-zh
          ports:
            - containerPort: 9000

          envFrom:
            - configMapRef:
                name: sonarqube-db-config

          livenessProbe:
            httpGet:
              path: /sessions/new
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 30

          readinessProbe:
            httpGet:
              path: /sessions/new
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 6

          resources:
            limits:
              cpu: 2000m
              memory: 2048Mi
            requests:
              cpu: 1000m
              memory: 1024Mi

          volumeMounts:
            - name: sonarqube-storage
              mountPath: /opt/sonarqube/data
              subPath: data
            - name: sonarqube-storage
              mountPath: /opt/sonarqube/conf
              subPath: conf

  volumeClaimTemplates:
    - metadata:
        name: sonarqube-storage
      spec:
        accessModes: [ "ReadWriteMany" ]
        storageClassName: nfs-csi
        resources:
          requests:
            storage: 20Gi