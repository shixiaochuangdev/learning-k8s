apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: gitlab-ns
data:
  redis.conf: |
    bind 0.0.0.0
    protected-mode yes
    port 6379

    dir /var/lib/redis

    # RDB snapshots
    save 900 1
    save 300 10
    save 60 10000
    dbfilename dump.rdb

    # AOF persistence
    appendonly yes
    appendfilename "appendonly.aof"
    appendfsync everysec

    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb