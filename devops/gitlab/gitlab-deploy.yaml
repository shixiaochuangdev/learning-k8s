apiVersion: v1
kind: Service
metadata:
  name: gitlab
  namespace: gitlab-ns
  labels:
    name: gitlab
spec:
  clusterIP: None
  selector:
    name: gitlab
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: ssh
      port: 22
      targetPort: 22
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: gitlab
  namespace: gitlab-ns
spec:
  serviceName: gitlab
  replicas: 1
  selector:
    matchLabels:
      name: gitlab
  template:
    metadata:
      labels:
        name: gitlab
    spec:
      containers:
        - name: gitlab
          image: shixiaochuangk8s/gitlab-ce:18.8.4-ce.0
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: GITLAB_TIMEZONE
              value: Beijing
            - name: GITLAB_SECRETS_DB_KEY_BASE
              value: long-and-random-alpha-numeric-string
            - name: GITLAB_SECRETS_SECRET_KEY_BASE
              value: long-and-random-alpha-numeric-string
            - name: GITLAB_SECRETS_OTP_KEY_BASE
              value: long-and-random-alpha-numeric-string
            - name: GITLAB_SECRETS_ENCRYPTED_SETTINGS_KEY_BASE
              value: long-and-random-alpha-numeric-string
            - name: GITLAB_ROOT_PASSWORD
              value: 940637335qqCOM
            - name: GITLAB_ROOT_EMAIL
              value: root@shixiaochuang.org
            - name: GITLAB_HOST
              value: gitlab.gitlab-ns.svc.cluster.local
            - name: GITLAB_PORT
              value: "80"
            - name: GITLAB_SSH_PORT
              value: "22"
            - name: GITLAB_NOTIFY_ON_BROKEN_BUILDS
              value: "true"
            - name: GITLAB_NOTIFY_PUSHER
              value: "false"
            - name: GITLAB_BACKUP_SCHEDULE
              value: daily
            - name: GITLAB_BACKUP_TIME
              value: "01:00"
            - name: DB_TYPE
              value: postgres
            - name: DB_HOST
              value: postgresql
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: db_user
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: db_pass
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: db_name
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASS
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: redis-password
            - name: SMTP_ENABLED
              value: "false"
            - name: SMTP_DOMAIN
              value: www.shixiaochuang.org
            - name: SMTP_HOST
              value: smtp.shixiaochuang.org
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: gitlab-smtp
                  key: smtp_user
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: gitlab-smtp
                  key: smtp_pass
            - name: SMTP_STARTTLS
              value: "true"
            - name: SMTP_AUTHENTICATION
              value: login
          ports:
            - name: http
              containerPort: 80
            - name: ssh
              containerPort: 22
          volumeMounts:
            - mountPath: /var/opt/gitlab
              name: gitlab-data
            - mountPath: /etc/gitlab
              name: gitlab-config
            - mountPath: /var/log/gitlab
              name: gitlab-logs
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 600
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
  volumeClaimTemplates:
    - metadata:
        name: gitlab-data
      spec:
        storageClassName: "nfs-csi"
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 50Gi
    - metadata:
        name: gitlab-config
      spec:
        storageClassName: "nfs-csi"
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 5Gi
    - metadata:
        name: gitlab-logs
      spec:
        storageClassName: "nfs-csi"
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 10Gi