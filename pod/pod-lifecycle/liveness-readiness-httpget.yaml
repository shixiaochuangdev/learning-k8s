apiVersion: v1
kind: Pod
metadata:
  name: liveness-readiness-httpget
  namespace: pod-ns
spec:
  containers:
  - name: liveness-readiness
    image: nginx:1.17.1
    imagePullPolicy: IfNotPresent
    ports:
    - name: http
      containerPort: 80

    livenessProbe:
      httpGet:
        port: http
        path: /index.html
      initialDelaySeconds: 1
      periodSeconds: 3

    readinessProbe:
      httpGet:
        port: http
        path: /index.html
      initialDelaySeconds: 5
      periodSeconds: 5