apiVersion: v1
kind: Pod
metadata:
  name: pod-liveness-tcpsocket
  namespace: pod-ns
spec:
  containers:
    - name: nginx
      image: shixiaochuangk8s/nginx:1.14-alpine
      ports:
        - name: nginx-port
          containerPort: 80
      livenessProbe:
        tcpSocket:
          port: 8080 # 尝试访问8080端口