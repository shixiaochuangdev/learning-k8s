apiVersion: v1
kind: Pod
metadata:
  name: cpb-demo
  namespace: sc-ns
spec:
  containers:
    - name: cpb
      image: shixiaochuangk8s/busybox:1.30
      args:
        - sleep
        - '3600'
      securityContext:
        capabilities:
          add: # 添加
            - NET_ADMIN
          drop: # 删除
            - KILL