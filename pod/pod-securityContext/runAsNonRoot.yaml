apiVersion: v1
kind: Pod
metadata:
  name: root-pod
  namespace: sc-ns
spec:
  containers:
    - name: c1
      image: shixiaochuangk8s/busybox:1.30
      command: [ "sh", "-c", "id && sleep 3600" ]

---
apiVersion: v1
kind: Pod
metadata:
  name: nonroot-pod
  namespace: sc-ns
spec:
  containers:
    - name: c1
      image: shixiaochuangk8s/busybox:1.30
      command: [ "sh", "-c", "id && sleep 3600" ]
      securityContext:
        runAsNonRoot: true